<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">

    <title>Login</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="contenedor">

    <h1>
        LOGIN {{ rol.upper() }}
    </h1>

    <form method="POST">

        <input
        type="text"
        name="usuario"
        placeholder="Usuario"
        required>

        <input
        type="password"
        name="password"
        placeholder="Contraseña"
        required>

        <button type="submit" class="btn">
            INGRESAR
        </button>

    </form>

</div>

</body>
</html>
