<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Médico</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="contenedor">

<h1>Panel Médico</h1>

<table>
<thead>
<tr>
<th>Nombre</th>
<th>Motivo</th>
<th>Dolor</th>
<th>Estado</th>
<th>Acción</th>
</tr>
</thead>

<tbody id="tablaMedico"></tbody>
</table>

</div>

<script>
function cargarMedico(){

fetch('/api/solicitudes')
.then(r => r.json())
.then(data => {

    let tabla = document.getElementById("tablaMedico");
    tabla.innerHTML = "";

    data.forEach(s => {

        let accion = "";

        if(s.estado === "Aprobado"){
            accion = `
            <a href="/atendido/${s.id_solicitud}">
                <button class="aprobar">Atendido</button>
            </a>
            `;
        } else {
            accion = "-";
        }

        tabla.innerHTML += `
        <tr>
            <td>${s.nombre}</td>
            <td>${s.motivo}</td>
            <td>${s.dolor}</td>
            <td>${s.estado}</td>
            <td>${accion}</td>
        </tr>
        `;
    });
});
}

setInterval(cargarMedico, 1000);
cargarMedico();
</script>

</body>
</html>
