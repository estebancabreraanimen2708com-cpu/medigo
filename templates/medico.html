<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Médico</title>
</head>

<body>

<h2>Médico</h2>

<table id="tabla">
<thead>
<tr>
<th>Nombre</th>
<th>Motivo</th>
<th>Acción</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
function cargar() {
fetch('/api/solicitudes')
.then(r => r.json())
.then(data => {
let tbody = document.querySelector("#tabla tbody");
tbody.innerHTML = "";

data.forEach(s => {

if(s.estado === "aprobado"){
tbody.innerHTML += `
<tr>
<td>${s.nombre}</td>
<td>${s.motivo}</td>
<td><a href="/atendido/${s.id_solicitud}">Atender</a></td>
</tr>`;
}

});
});
}

setInterval(cargar, 5000);
cargar();
</script>

</body>
</html>
