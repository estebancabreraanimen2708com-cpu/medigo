<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="contenedor-app">

<div class="cabecera-azul">
<h2>Médico</h2>
</div>

<div class="contenido">
<div style="display:flex; gap:10px; justify-content:center;">
<a href="/solicitudes"><button class="btn-principal">Solicitudes</button></a>
<a href="/inspector"><button class="btn-principal">Inspector</button></a>
<a href="/medico"><button class="btn-principal">Médico</button></a>
</div>
</div>

<div id="tablaMedico" class="contenido"></div>

</div>

<script>

let cargando = false;

function cargar(){

if(cargando) return;
cargando = true;

fetch('/api/solicitudes')
.then(r=>r.json())
.then(data=>{

let cont = document.getElementById("tablaMedico");
cont.innerHTML = "";

data.forEach(s=>{

cont.innerHTML += `
<div class="tarjeta-solicitud">

<div class="fila-info">
<span class="nombre-est">${s.nombre}</span>
<span>${s.estado}</span>
</div>

<div>${s.motivo}</div>

${s.estado==="aprobado" ? `
<a href="/atendido/${s.id_solicitud}">
<button>Atender</button>
</a>
` : ``}

</div>
`;

});

cargando = false;

});

}

if(!window.intervalMedico){
window.intervalMedico = setInterval(cargar,3000);
}

cargar();

</script>

</body>
</html>
