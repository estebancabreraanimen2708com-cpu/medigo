<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="contenedor-app">

<div class="cabecera-azul">
<h2>Médico</h2>
</div>

<div class="contenido">
<div style="display:flex; gap:15px; justify-content:center; margin-bottom:15px;">
<a href="/solicitudes"><button class="btn-principal">Solicitudes</button></a>
<a href="/inspector"><button class="btn-principal">Inspector</button></a>
<a href="/medico"><button class="btn-principal">Médico</button></a>
</div>
</div>

<div class="contenido" id="contenedor"></div>

</div>

<script>
Notification.requestPermission();

let ultimoId = 0;

function sonido(){
    let audio = new Audio("/static/mixkit-correct-answer-tone-2870.wav");
    audio.play();
}

function notificar(texto){
    if (Notification.permission === "granted") {
        new Notification("MediGo", { body: texto });
    }
}

function cargar(){
fetch('/api/solicitudes')
.then(r=>r.json())
.then(data=>{

    if(data.length > 0){
        let nueva = data[0];

        if(nueva.id_solicitud > ultimoId){
            notificar("Nueva actualización: " + nueva.nombre);
            sonido();
            ultimoId = nueva.id_solicitud;
        }
    }

    let c=document.getElementById("contenedor");
    c.innerHTML="";

    data.forEach(s=>{
    if(s.estado==="aprobado"){
    c.innerHTML+=`
    <div class="tarjeta-solicitud">
    <b>${s.nombre}</b><br>
    ${s.motivo}<br>

    <a href="/atendido/${s.id_solicitud}">
    <button class="btn-principal">Atender</button>
    </a>

    </div>`;
    }
    });

});
}

setInterval(cargar,3000);
cargar();
</script>

</body>
</html>
