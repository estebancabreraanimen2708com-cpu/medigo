<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Médico</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>

.medico-layout{
    display:grid;
    grid-template-columns:220px 1fr 220px;
    gap:25px;
    align-items:center;
    width:100%;
    max-width:1500px;
}

.medico-img{
    width:100%;
    height:430px;
    object-fit:cover;
    border-radius:28px;
    border:3px solid #ffcc00;
    box-shadow:0 15px 35px rgba(0,0,0,.25);
}

.btn-mas-medico{
    position:fixed;
    bottom:28px;
    right:28px;
    width:78px;
    height:78px;
    border-radius:50%;
    border:none;
    background:linear-gradient(135deg,#38bdf8,#ffcc00);
    color:#002b5c;
    font-size:44px;
    font-weight:bold;
    cursor:pointer;
    z-index:999;
}

.obs-area{
    width:220px;
    min-height:80px;
    padding:10px;
    border-radius:12px;
    border:2px solid #38bdf8;
    resize:vertical;
    font-size:13px;
}

.btn-obs{
    margin-top:8px;
    padding:8px 12px;
    border:none;
    border-radius:10px;
    background:#ffcc00;
    color:#002b5c;
    font-weight:bold;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="medico-layout">

<img
src="{{ url_for('static', filename='donbosco1.jpg') }}"
class="medico-img">

<div class="contenedor">

<h1>Panel Médico</h1>

<div class="tabla-scroll">

<table>

<thead>
<tr>
<th>Curso</th>
<th>Nombre</th>
<th>Motivo</th>
<th>Dolor</th>
<th>Estado</th>
<th>Fecha</th>
<th>Acción</th>
<th>Observaciones</th>
</tr>
</thead>

<tbody id="tablaMedico"></tbody>

</table>

</div>

</div>

<img
src="{{ url_for('static', filename='donbosco2.jpg') }}"
class="medico-img">

</div>

<script>

function cargarMedico(){

fetch('/api/solicitudes')

.then(r => r.json())

.then(data => {

    let tabla = document.getElementById("tablaMedico");

    tabla.innerHTML = "";

    data.forEach(s => {

        let accion = "";

        if(s.estado === "Aprobado"){

            accion = `
            <a href="/atendido/${s.id_solicitud}">
                <button class="aprobar">
                Atendido
                </button>
            </a>
            `;

        }else{

            accion = "-";

        }

        let dolorTexto = "";

        if(s.dolor == 1){
            dolorTexto = "😊 Leve";
        }

        else if(s.dolor == 2){
            dolorTexto = "😐 Moderado";
        }

        else if(s.dolor == 3){
            dolorTexto = "😖 Urgente";
        }

        tabla.innerHTML += `

        <tr>

            <td>${s.curso || ""}</td>

            <td>
                <a
                href="/historial/${encodeURIComponent(s.nombre)}"
                style="
                color:#0056b3;
                font-weight:bold;
                text-decoration:none;
                ">
                    ${s.nombre}
                </a>
            </td>

            <td>${s.motivo}</td>

            <td>${dolorTexto}</td>

            <td>${s.estado}</td>

            <td>${s.fecha}</td>

            <td>${accion}</td>

            <td>

                <form
                method="POST"
                action="/observacion/${s.id_solicitud}">

                    <textarea
                    class="obs-area"
                    name="observaciones"
                    placeholder="Escribir observación..."
                    >${s.observaciones || ""}</textarea>

                    <br>

                    <button
                    class="btn-obs"
                    type="submit">

                    Guardar

                    </button>

                </form>

            </td>

        </tr>

        `;

    });

});

}

setInterval(cargarMedico,3000);

cargarMedico();

</script>

</body>
</html>
