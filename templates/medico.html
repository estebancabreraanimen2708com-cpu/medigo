<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Médico</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>

body{
    margin:0;
    overflow-x:hidden;
}

.fondo-animado{
    position:fixed;
    inset:0;
    z-index:-1;
    background:
    linear-gradient(135deg,#38bdf8,#ffffff,#ffcc00);
    background-size:400% 400%;
    animation:fondo 12s ease infinite;
}

@keyframes fondo{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

.medico-layout{
    display:grid;
    grid-template-columns:220px 1fr 220px;
    gap:25px;
    align-items:center;
    width:100%;
    max-width:1500px;
    margin:auto;
    padding:25px;
}

.medico-img{
    width:100%;
    height:450px;
    object-fit:cover;
    border-radius:30px;
    border:4px solid #ffcc00;
    box-shadow:0 15px 35px rgba(0,0,0,.25);
}

.obs-area{
    width:220px;
    min-height:80px;
    border-radius:15px;
    border:2px solid #38bdf8;
    padding:10px;
    resize:vertical;
}

.btn-obs{
    margin-top:8px;
    padding:8px 15px;
    border:none;
    border-radius:10px;
    background:#ffcc00;
    color:#002b5c;
    font-weight:bold;
    cursor:pointer;
}

@media(max-width:1200px){

.medico-layout{
    grid-template-columns:1fr;
}

.medico-img{
    height:250px;
}

}

</style>

</head>

<body>

<div class="fondo-animado"></div>

<div class="medico-layout">

<img
src="{{ url_for('static', filename='donbosco1.jpg') }}"
class="medico-img">

<div class="contenedor">

<h1>Panel Médico</h1>

<div class="tabla-scroll">

<table>

<thead>

<tr>
<th>Curso</th>
<th>Nombre</th>
<th>Motivo</th>
<th>Dolor</th>
<th>Estado</th>
<th>Fecha</th>
<th>Acción</th>
<th>Observaciones</th>
</tr>

</thead>

<tbody id="tablaMedico"></tbody>

</table>

</div>

</div>

<img
src="{{ url_for('static', filename='donbosco2.jpg') }}"
class="medico-img">

</div>

<script>

function cargarMedico(){

fetch('/api/solicitudes')

.then(r => r.json())

.then(data => {

    let tabla = document.getElementById("tablaMedico");

    tabla.innerHTML = "";

    data.forEach(s => {

        let accion = "-";

        if(s.estado === "Aprobado"){

            accion = `
            <a href="/atendido/${s.id_solicitud}">
                <button class="aprobar">
                Atendido
                </button>
            </a>
            `;

        }

        let dolorTexto = "";

        if(s.dolor == 1){
            dolorTexto = "😊 Leve";
        }

        else if(s.dolor == 2){
            dolorTexto = "😐 Moderado";
        }

        else if(s.dolor == 3){
            dolorTexto = "😖 Urgente";
        }

        tabla.innerHTML += `

        <tr>

            <td>${s.curso || ""}</td>

            <td>
                <a
                href="/historial/${encodeURIComponent(s.nombre)}"
                style="
                color:#0056b3;
                font-weight:bold;
                text-decoration:none;
                ">
                    ${s.nombre}
                </a>
            </td>

            <td>${s.motivo}</td>

            <td>${dolorTexto}</td>

            <td>${s.estado}</td>

            <td>${s.fecha}</td>

            <td>${accion}</td>

            <td>

                <form
                method="POST"
                action="/observacion/${s.id_solicitud}">

                    <textarea
                    class="obs-area"
                    name="observaciones"
                    placeholder="Escribir observación..."
                    >${s.observaciones || ""}</textarea>

                    <br>

                    <button
                    class="btn-obs"
                    type="submit">

                    Guardar

                    </button>

                </form>

            </td>

        </tr>

        `;

    });

});

}

setInterval(cargarMedico,3000);

cargarMedico();

</script>

</body>
</html>
