<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Médico</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="contenedor-app">

<div class="cabecera-azul">
<h2>Médico</h2>
</div>

<div class="contenido" id="contenedor"></div>

</div>

<script>
function cargar(){
fetch('/api/solicitudes')
.then(r=>r.json())
.then(data=>{
let c=document.getElementById("contenedor");
c.innerHTML="";

data.forEach(s=>{
if(s.estado==="aprobado"){
c.innerHTML+=`
<div class="tarjeta-solicitud">
<b>${s.nombre}</b><br>
${s.motivo}<br>
<a href="/atendido/${s.id_solicitud}">
<button>Atender</button>
</a>
</div>`;
}
});
});
}

setInterval(cargar,5000);
cargar();
</script>

</body>
</html>
