<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Médico</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="contenedor">

<h1>Panel Médico</h1>

<table>

<tr>

<th>Nombre</th>
<th>Motivo</th>
<th>Dolor</th>
<th>Estado</th>

</tr>

{% for s in solicitudes %}

<tr>

<td>{{ s.nombre }}</td>

<td>{{ s.motivo }}</td>

<td>{{ s.dolor }}</td>

<td>{{ s.estado }}</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
