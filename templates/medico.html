<script>
function cargar(){

fetch('/api/solicitudes')
.then(r=>r.json())
.then(data=>{

let cont = document.getElementById("tablaMedico");
cont.innerHTML = "";

let ids = new Set();

data.forEach(s=>{

if(ids.has(s.id_solicitud)) return;
ids.add(s.id_solicitud);

cont.innerHTML += `
<div class="tarjeta-solicitud">

<div class="fila-info">
<span class="nombre-est">${s.nombre}</span>
<span>${s.estado}</span>
</div>

<div>${s.motivo}</div>

${s.estado==="aprobado" ? `
<a href="/atendido/${s.id_solicitud}">
<button>Atender</button>
</a>
` : ``}

</div>
`;
});

});
}

setInterval(cargar,3000);
cargar();
</script>
