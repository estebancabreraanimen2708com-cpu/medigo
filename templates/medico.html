<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Médico</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>
.imagen-lateral{
    position:fixed;
    top:130px;
    width:220px;
    height:430px;
    object-fit:cover;
    border-radius:28px;
    border:3px solid #ffcc00;
    box-shadow:0 15px 35px rgba(0,0,0,.35);
    opacity:.9;
}

.img-izquierda{
    left:45px;
}

.img-derecha{
    right:45px;
}

.btn-mas-medico{
    position:fixed;
    top:135px;
    right:65px;
    width:70px;
    height:70px;
    border-radius:50%;
    border:none;
    background:linear-gradient(135deg,#ffcc00,#ffb703);
    color:#002b5c;
    font-size:42px;
    font-weight:bold;
    cursor:pointer;
    z-index:999;
    box-shadow:0 10px 30px rgba(0,0,0,.35);
}

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.65);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:1000;
    padding:15px;
}

.modal-content{
    width:95%;
    max-width:600px;
    max-height:90vh;
    overflow-y:auto;
    background:#0f172a;
    border-radius:25px;
    padding:30px;
    border:2px solid #ffcc00;
}

.cerrar{
    float:right;
    font-size:32px;
    cursor:pointer;
    color:white;
}

@media(max-width:1100px){
    .imagen-lateral{
        display:none;
    }

    .btn-mas-medico{
        top:auto;
        bottom:20px;
        right:20px;
    }
}
</style>
</head>

<body>

<img 
src="{{ url_for('static', filename='donbosco1.jpg') }}" 
onerror="this.src='{{ url_for('static', filename='logo.jpg') }}'"
class="imagen-lateral img-izquierda">

<img 
src="{{ url_for('static', filename='donbosco2.jpg') }}" 
onerror="this.src='{{ url_for('static', filename='logo.jpg') }}'"
class="imagen-lateral img-derecha">

<button class="btn-mas-medico" onclick="abrirModal()">+</button>

<div class="contenedor">

<h1>Panel Médico</h1>

<div class="tabla-scroll">

<table>
<thead>
<tr>
<th>Curso</th>
<th>Nombre</th>
<th>Motivo</th>
<th>Dolor</th>
<th>Estado</th>
<th>Fecha</th>
<th>Acción</th>
</tr>
</thead>

<tbody id="tablaMedico"></tbody>
</table>

</div>

</div>

<div id="modal" class="modal">

<div class="modal-content">

<span class="cerrar" onclick="cerrarModal()">×</span>

<h2>Nueva Solicitud</h2>

<form method="POST" action="/solicitudes">

<div class="card-seccion">
<h3>Curso</h3>

<input
type="text"
name="curso"
placeholder="Ejemplo: 7mo A"
required>
</div>

<div class="card-seccion">
<h3>Nombre del estudiante</h3>

<input
type="text"
name="nombre_manual"
placeholder="Escribe el nombre del estudiante"
required>
</div>

<div class="card-seccion">
<h3>Motivo</h3>

<textarea
name="motivo"
placeholder="Motivo"
required></textarea>
</div>

<div class="card-seccion">
<h3>Nivel de Dolor</h3>

<div class="emociones">

<input type="radio" name="dolor" value="1" id="medDolor1" required>
<label for="medDolor1" class="cara verde">
<div class="emoji">😊</div>
<span>Leve</span>
</label>

<input type="radio" name="dolor" value="2" id="medDolor2">
<label for="medDolor2" class="cara amarillo">
<div class="emoji">😐</div>
<span>Moderado</span>
</label>

<input type="radio" name="dolor" value="3" id="medDolor3">
<label for="medDolor3" class="cara rojo">
<div class="emoji">😖</div>
<span>Urgente</span>
</label>

</div>
</div>

<button type="submit" class="btn medico">
ENVIAR SOLICITUD
</button>

</form>

</div>
</div>

<script>
function abrirModal(){
    document.getElementById("modal").style.display = "flex";
}

function cerrarModal(){
    document.getElementById("modal").style.display = "none";
}

function cargarMedico(){

fetch('/api/solicitudes')
.then(r => r.json())
.then(data => {

    let tabla = document.getElementById("tablaMedico");
    tabla.innerHTML = "";

    data.forEach(s => {

        let accion = "";

        if(s.estado === "Aprobado"){
            accion = `
            <a href="/atendido/${s.id_solicitud}">
                <button class="aprobar">Atendido</button>
            </a>`;
        } else {
            accion = "-";
        }

        let dolorTexto = "";

        if(s.dolor == 1){
            dolorTexto = "😊 Leve";
        } else if(s.dolor == 2){
            dolorTexto = "😐 Moderado";
        } else if(s.dolor == 3){
            dolorTexto = "😖 Urgente";
        } else {
            dolorTexto = s.dolor;
        }

        tabla.innerHTML += `
        <tr>
            <td>${s.curso || ""}</td>
            <td>${s.nombre}</td>
            <td>${s.motivo}</td>
            <td>${dolorTexto}</td>
            <td>${s.estado}</td>
            <td>${s.fecha}</td>
            <td>${accion}</td>
        </tr>`;
    });
});
}

setInterval(cargarMedico, 1000);
cargarMedico();
</script>

</body>
</html>
