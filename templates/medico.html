<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
<div class="contenedor-app">

<div class="cabecera-azul">
<h2>Médico</h2>
</div>

<div class="contenido">
<a href="/logout" class="btn-secundario">Cerrar sesión</a>
</div>

<div id="tablaMedico" class="contenido"></div>

</div>

<script>
let cargando=false;

function cargar(){
if(cargando) return;
cargando=true;

fetch('/api/solicitudes')
.then(r=>r.json())
.then(data=>{
let cont=document.getElementById("tablaMedico");
cont.innerHTML="";

data.forEach(s=>{
cont.innerHTML+=`
<div class="tarjeta-solicitud">
<b>${s.nombre}</b> - ${s.estado}<br>
${s.motivo}<br>

${s.estado==="aprobado"?`
<a href="/atendido/${s.id_solicitud}">
<button>Atender</button>
</a>`:""}

</div>`;
});

cargando=false;
});
}

setInterval(cargar,3000);
cargar();
</script>

</body>
</html>
