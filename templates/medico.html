<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Médico</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="medico-layout">

<img
src="{{ url_for('static', filename='donbosco1.jpg') }}"
class="medico-img">

<div class="contenedor">

<h1>Panel Médico</h1>

<div class="tabla-scroll">

<table>

<thead>

<tr>

<th>Curso</th>
<th>Nombre</th>
<th>Motivo</th>
<th>Dolor</th>
<th>Estado</th>
<th>Fecha</th>
<th>Subida</th>
<th>Observaciones</th>

</tr>

</thead>

<tbody id="tablaMedico"></tbody>

</table>

</div>

</div>

<img
src="{{ url_for('static', filename='donbosco2.jpg') }}"
class="medico-img">

</div>

<script>

function cargarMedico(){

fetch('/api/solicitudes')

.then(r=>r.json())

.then(data=>{

let tabla=
document.getElementById(
"tablaMedico"
);

tabla.innerHTML="";

data.forEach(s=>{

let dolorTexto="";

if(s.dolor==1){

dolorTexto="😊 Leve";

}

else if(s.dolor==2){

dolorTexto="😐 Moderado";

}

else{

dolorTexto="😖 Urgente";

}

tabla.innerHTML+=`

<tr>

<td>${s.curso||""}</td>

<td>

<a
href="/historial/${encodeURIComponent(s.nombre)}"
style="
color:#0056b3;
font-weight:bold;
">

${s.nombre}

</a>

</td>

<td>${s.motivo}</td>

<td>${dolorTexto}</td>

<td>${s.estado}</td>

<td>${s.fecha}</td>

<td>

<div style="
display:flex;
flex-direction:column;
gap:8px;
">

<a href="/estado_medico/disponible?id=${s.id_solicitud}">

<button class="btn-subir">

🟢 Puede subir

</button>

</a>

<a href="/estado_medico/no_disponible?id=${s.id_solicitud}">

<button class="btn-nosubir">

🔴 No puede subir

</button>

</a>

</div>

</td>

<td>

<form
method="POST"
action="/observacion/${s.id_solicitud}">

<textarea
class="obs-area"
name="observaciones"
placeholder="Escribir..."
>

${s.observaciones||""}

</textarea>

<button
class="btn-obs"
type="submit">

Guardar

</button>

</form>

</td>

</tr>

`;

});

});

}

setInterval(
cargarMedico,
3000
);

cargarMedico();

</script>

</body>
</html>
