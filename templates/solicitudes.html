<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Nueva Solicitud</title>

<link rel="stylesheet"
href="{{ url_for('static',
filename='style.css') }}">

</head>

<body>

<div class="contenedor">

<img
src="{{ url_for('static',
filename='logo.jpg') }}"
class="logo">


<h1>

Nueva Solicitud

</h1>


<form
method="POST"

onsubmit="
return confirm(
'¿Seguro que deseas enviar esta solicitud médica?'
)
">


<label>

Curso

</label>

<select
name="curso"
required>

<option value="">
Seleccionar curso
</option>

<option>
1ro Bachillerato A
</option>

<option>
2do Bachillerato A
</option>

<option>
3ro Bachillerato INF
</option>

<option>
3ro Bachillerato ET
</option>

</select>



<label>

Nombre del estudiante

</label>

<input
type="text"

name="nombre"

placeholder="
Escribe el nombre
"

required>



<label>

Motivo

</label>

<textarea

name="motivo"

placeholder="
Escribe el motivo...
"

required

></textarea>



<h2>

Nivel de Dolor

</h2>


<div class="dolor">

<label>

<input
type="radio"
name="dolor"
value="1"
required>

😊 Leve

</label>

<label>

<input
type="radio"
name="dolor"
value="2">

😐 Moderado

</label>

<label>

<input
type="radio"
name="dolor"
value="3">

😖 Urgente

</label>

</div>



<button
type="submit"
class="btn profesor">

ENVIAR SOLICITUD

</button>


</form>

</div>

</body>

</html>
