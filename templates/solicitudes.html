<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Solicitudes</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="contenedor-app">

    <div class="cabecera-azul">
        <h2>Nueva Solicitud Médica</h2>
    </div>

    <div class="contenido">

        <form method="POST">

            <label>Estudiante</label>
            <select name="estudiante" required>
                {% for e in estudiantes %}
                    <option value="{{ e.id_estudiante }}">
                        {{ e.nombre }}
                    </option>
                {% endfor %}
            </select>

            <label>Nivel de dolor</label>

            <div class="escala-dolor">
                {% for i in range(1,11) %}
                <label class="nivel-btn n-{{i}}">
                    <input type="radio" name="dolor" value="{{i}}" required>
                    <span>{{i}}</span>
                </label>
                {% endfor %}
            </div>

            <label>Motivo</label>
            <textarea name="motivo" required></textarea>

            <button class="btn-principal">
                Enviar solicitud
            </button>

        </form>

    </div>

    <div class="contenido">

        <h3>Solicitudes registradas</h3>

        <table style="width:100%; border-collapse: collapse; margin-top:15px;">

            <tr style="background:#0056b3; color:white;">
                <th style="padding:10px;">Estudiante</th>
                <th style="padding:10px;">Motivo</th>
                <th style="padding:10px;">Estado</th>
                <th style="padding:10px;">Fecha</th>
            </tr>

            {% for s in solicitudes %}
            <tr style="text-align:center; border-bottom:1px solid #ddd;">
                <td style="padding:8px;">{{ s.nombre }}</td>
                <td style="padding:8px;">{{ s.motivo }}</td>
                <td style="padding:8px;">{{ s.estado }}</td>
                <td style="padding:8px;">
                    {{ s.fecha.strftime('%d/%m/%Y %H:%M') if s.fecha }}
                </td>
            </tr>
            {% endfor %}

        </table>

    </div>

</div>

</body>
</html>
