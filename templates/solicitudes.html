<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<script>
if (Notification.permission !== "granted") {
    Notification.requestPermission();
}
</script>
</head>

<body>

<div class="contenedor-app">

<div class="cabecera-azul"><h2>MediGo</h2></div>

<div class="contenido">
<a href="/inspector"><button class="btn-principal">Inspector</button></a>
<a href="/medico"><button class="btn-principal">Médico</button></a>
</div>

<div class="contenido">

<form method="POST">

<select name="estudiante">
{% for e in estudiantes %}
<option value="{{e.id_estudiante}}">{{e.nombre}}</option>
{% endfor %}
</select>

<div class="escala-dolor">
{% for i in range(1,11) %}
<label class="nivel-btn n-{{i}}">
<input type="radio" name="dolor" value="{{i}}">
<span>{{i}}</span>
</label>
{% endfor %}
</div>

<textarea name="motivo"></textarea>

<button class="btn-principal">Enviar</button>

</form>
</div>

</div>

<script>
let ultimoId = 0;

function sonido(){
    new Audio("/static/notificacion.mp3").play();
}

function notificar(t){
    if(Notification.permission==="granted"){
        new Notification("MediGo",{body:t});
    }
}

function cargar(){
fetch('/api/solicitudes')
.then(r=>r.json())
.then(d=>{
if(d.length>0){
let n=d[0];
if(n.id_solicitud>ultimoId){
notificar("Nueva solicitud de "+n.nombre);
sonido();
ultimoId=n.id_solicitud;
}
}
});
}

setInterval(cargar,4000);
</script>

</body>
</html>
