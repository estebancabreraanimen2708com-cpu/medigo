<!DOCTYPE html>
<html>
<head>
    <title>Solicitudes Médicas</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f4f4f4;
            text-align: center;
        }

        h1 {
            color: #333;
        }

        form {
            background: white;
            padding: 20px;
            margin: 20px auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        select, input, button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            background-color: #28a745;
            color: white;
            border: none;
            cursor: pointer;
        }

        table {
            margin: auto;
            width: 80%;
            background: white;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
        }

        th {
            background-color: #333;
            color: white;
        }
    </style>
</head>

<body>

<h1>Solicitud Médica</h1>

<!-- FORMULARIO -->
<form action="/guardar_solicitud" method="POST">

    <label>Seleccionar Estudiante</label>
    <select name="estudiante" required>
        {% for e in estudiantes %}
            <option value="{{ e.id_estudiante }}">{{ e.nombres }}</option>
        {% endfor %}
    </select>

    <label>Nivel de dolor (1 - 10)</label>
    <input type="number" name="dolor" min="1" max="10" required>

    <button type="submit">Enviar solicitud</button>

</form>

<br><br>

<h2>Solicitudes Registradas</h2>

<!-- TABLA -->
<table>

<tr>
    <th>ID Estudiante</th>
    <th>Nivel Dolor</th>
</tr>

{% for s in solicitudes %}
<tr>
    <td>{{ s.id_estudiante }}</td>
    <td>{{ s.nivel_dolor }}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
