<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Solicitudes</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="contenedor-app">

<div class="cabecera-azul">
<h2>Solicitudes</h2>
</div>

<div class="contenido">

<form method="POST">
<select name="estudiante">
{% for e in estudiantes %}
<option value="{{e.id_estudiante}}">{{e.nombre}}</option>
{% endfor %}
</select>

<input type="text" name="motivo" placeholder="Motivo" required>

<button>Enviar</button>
</form>

</div>

<div class="contenido">

<table id="tabla">
<thead>
<tr>
<th>Estudiante</th>
<th>Motivo</th>
<th>Estado</th>
<th>Fecha</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

</div>

<script>
function cargar() {
fetch('/api/solicitudes')
.then(r => r.json())
.then(data => {
let tbody = document.querySelector("#tabla tbody");
tbody.innerHTML = "";

data.forEach(s => {
tbody.innerHTML += `
<tr>
<td>${s.nombre}</td>
<td>${s.motivo}</td>
<td>${s.estado}</td>
<td>${new Date(s.fecha).toLocaleString()}</td>
</tr>`;
});
});
}

setInterval(cargar, 5000);
cargar();
</script>

</body>
</html>
