<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="contenedor-app">

<div class="cabecera-azul">
<h2>MediGo</h2>
</div>

<!-- MENÚ -->
<div class="contenido">
<div style="display:flex; gap:15px; justify-content:center; flex-wrap:wrap;">
<a href="/solicitudes"><button class="btn-principal">Solicitudes</button></a>
<a href="/inspector"><button class="btn-principal">Inspector</button></a>
<a href="/medico"><button class="btn-principal">Médico</button></a>
</div>
</div>

<!-- MENSAJE -->
<div class="contenido">
<div id="mensaje" style="display:none; background:#f8d7da; padding:10px; border-radius:10px; margin-bottom:10px;"></div>

<form method="POST" onsubmit="return validarFormulario()">

<select name="estudiante" id="estudiante">
<option value="">Seleccione estudiante</option>
{% for e in estudiantes %}
<option value="{{e.id_estudiante}}">{{e.nombre}}</option>
{% endfor %}
</select>

<div class="escala-dolor">
{% for i in range(1,11) %}
<label class="nivel-btn n-{{i}}">
<input type="radio" name="dolor" value="{{i}}">
<span>{{i}}</span>
</label>
{% endfor %}
</div>

<textarea name="motivo" id="motivo" placeholder="Escriba el motivo"></textarea>

<button type="submit" class="btn-principal">Enviar</button>

</form>
</div>

<!-- TABLA -->
<div class="contenido" id="contenedor"></div>

</div>

<script>

// 🔥 PERMISO BIEN HECHO
if (Notification.permission !== "granted") {
    Notification.requestPermission();
}

let estados = {};

function sonido(){
    new Audio("/static/mixkit-correct-answer-tone-2870.wav").play();
}

// 🔥 NOTIFICACIÓN CORREGIDA
function notificar(texto){
    if (Notification.permission === "granted") {
        try{
            new Notification("MediGo", {
                body: texto
            });
        } catch(e){
            console.log("Error notificación:", e);
        }
    }
}

function mostrarMensaje(texto){
    let m = document.getElementById("mensaje");
    m.innerText = texto;
    m.style.display = "block";
    setTimeout(()=>m.style.display="none",3000);
}

function cargar(){
fetch('/api/solicitudes')
.then(r=>r.json())
.then(data=>{

let c = document.getElementById("contenedor");
c.innerHTML = "";

data.forEach(s=>{

    // 🔥 DETECTAR CAMBIO DE ESTADO
    if(estados[s.id_solicitud] && estados[s.id_solicitud] !== s.estado){

        let texto = "";

        if(s.estado === "aprobado"){
            texto = "✅ Aprobado: " + s.nombre;
        }

        if(s.estado === "rechazado"){
            texto = "❌ Rechazado: " + s.nombre;
        }

        if(s.estado === "atendido"){
            texto = "🏥 Atendido: " + s.nombre;
        }

        if(texto !== ""){
            notificar(texto);
            sonido();
        }
    }

    estados[s.id_solicitud] = s.estado;

    c.innerHTML += `
    <div class="tarjeta-solicitud">
        <div class="fila-info">
            <span class="nombre-est">${s.nombre}</span>
            <span>${s.estado}</span>
        </div>

        <div class="cuadro-motivo">${s.motivo}</div>

        <small>${s.fecha}</small>
    </div>
    `;
});

});
}

// 🔄 ACTUALIZA SOLO
setInterval(cargar,3000);
cargar();

function validarFormulario(){

let estudiante = document.getElementById("estudiante").value;
let motivo = document.getElementById("motivo").value;
let dolor = document.querySelector('input[name="dolor"]:checked');

if(estudiante === "" || motivo.trim() === "" || !dolor){
mostrarMensaje("⚠️ Debe completar todos los campos");
return false;
}

return confirm("¿Deseas enviar la solicitud?");
}

</script>

</body>
</html>
