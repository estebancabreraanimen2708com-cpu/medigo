<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="contenedor-app">

<div class="cabecera-azul"><h2>MediGo</h2></div>

<div class="contenido">
<div style="display:flex; gap:10px; justify-content:center; margin-bottom:15px;">
<a href="/solicitudes"><button class="btn-principal">Solicitudes</button></a>
<a href="/inspector"><button class="btn-principal">Inspector</button></a>
<a href="/medico"><button class="btn-principal">Médico</button></a>
</div>
</div>

<div class="contenido">
<form method="POST">

<select name="estudiante">
{% for e in estudiantes %}
<option value="{{e.id_estudiante}}">{{e.nombre}}</option>
{% endfor %}
</select>

<div class="escala-dolor">
{% for i in range(1,11) %}
<label class="nivel-btn n-{{i}}">
<input type="radio" name="dolor" value="{{i}}">
<span>{{i}}</span>
</label>
{% endfor %}
</div>

<textarea name="motivo" required></textarea>

<button class="btn-principal">Enviar</button>

</form>
</div>

<div class="contenido" id="contenedor"></div>

</div>

<script>
function cargar(){
fetch('/api/solicitudes')
.then(r=>r.json())
.then(data=>{
let c=document.getElementById("contenedor");
c.innerHTML="";

data.forEach(s=>{
c.innerHTML+=`
<div class="tarjeta-solicitud">
<div class="fila-info">
<span class="nombre-est">${s.nombre}</span>
<span class="estado estado-${s.estado}">${s.estado}</span>
</div>

<div class="cuadro-motivo">${s.motivo}</div>

<small>${new Date(s.fecha).toLocaleString()}</small>
</div>`;
});
});
}

setInterval(cargar,3000);
cargar();
</script>

</body>
</html>
