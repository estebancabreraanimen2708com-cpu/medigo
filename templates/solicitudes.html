<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<title>Solicitudes</title>
</head>

<body>

<div class="contenedor-app">

<!-- CABECERA -->
<div class="cabecera-azul">
<h2>Enviar Solicitud Médica</h2>
</div>

<!-- MENÚ -->
<div class="contenido">
<div style="display:flex; gap:15px; justify-content:center; flex-wrap:wrap;">
<a href="/solicitudes"><button class="btn-principal">Solicitudes</button></a>
<a href="/inspector"><button class="btn-principal">Inspector</button></a>
<a href="/medico"><button class="btn-principal">Médico</button></a>
</div>
</div>

<!-- FORMULARIO -->
<div class="contenido">

<form method="POST" onsubmit="return confirmar()">

<label>Estudiante</label>
<select name="estudiante" id="estudiante" required>
<option value="">Seleccionar...</option>
{% for e in estudiantes %}
<option value="{{ e.id_estudiante }}">{{ e.nombre }}</option>
{% endfor %}
</select>

<label>Motivo</label>
<textarea name="motivo" id="motivo" required></textarea>

<label>Nivel de dolor</label>

<div class="escala-dolor">
{% for i in range(1,11) %}
<label class="nivel-btn n-{{i}}">
<input type="radio" name="dolor" value="{{i}}" required>
<span>{{i}}</span>
</label>
{% endfor %}
</div>

<button class="btn-principal">Enviar</button>

</form>

</div>

<!-- TABLA -->
<div class="contenido">

<h3>Historial de Solicitudes</h3>

<table style="width:100%; border-collapse:collapse;" id="tablaSolicitudes">

<thead>
<tr style="background:#0056b3; color:white;">
<th>Nombre</th>
<th>Motivo</th>
<th>Estado</th>
<th>Fecha</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

</div>

<script>

// 🔔 permisos notificaciones
if (Notification.permission !== "granted") {
    Notification.requestPermission();
}

let ultimoEstado = {};

// 🔊 sonido
function sonido(){
    new Audio("/static/mixkit-correct-answer-tone-2870.wav").play();
}

// 🔔 notificación
function notificar(texto){
    if(Notification.permission==="granted"){
        new Notification("MediGo",{body:texto});
    }
    sonido();
}

// 📋 cargar tabla
function cargar(){
fetch('/api/solicitudes')
.then(r=>r.json())
.then(data=>{

let tbody = document.querySelector("#tablaSolicitudes tbody");
tbody.innerHTML="";

data.forEach(s=>{

// 🔔 detectar cambios de estado
if(ultimoEstado[s.id_solicitud] && ultimoEstado[s.id_solicitud] !== s.estado){

if(s.estado==="aprobado"){
notificar("Solicitud aprobada: "+s.nombre);
}

if(s.estado==="rechazado"){
notificar("Solicitud rechazada: "+s.nombre);
}

if(s.estado==="atendido"){
notificar("Paciente atendido: "+s.nombre);
}

}

ultimoEstado[s.id_solicitud] = s.estado;

// 📋 tabla
tbody.innerHTML+=`
<tr style="border-bottom:1px solid #ccc;">
<td>${s.nombre}</td>
<td>${s.motivo}</td>
<td>${s.estado}</td>
<td>${s.fecha}</td>
</tr>
`;

});

});
}

// 🔁 actualizar
setInterval(cargar,3000);
cargar();

// ⚠️ confirmar envío
function confirmar(){

let est = document.getElementById("estudiante").value;
let mot = document.getElementById("motivo").value;
let dolor = document.querySelector('input[name="dolor"]:checked');

if(!est || !mot || !dolor){
alert("Debes completar todos los campos");
return false;
}

return confirm("¿Enviar solicitud?");
}

</script>

</body>
</html>
