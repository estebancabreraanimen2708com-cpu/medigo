<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="contenedor-app">

<div class="cabecera-azul"><h2>MediGo</h2></div>

<div class="contenido">
<div style="display:flex; gap:15px; justify-content:center;">
<a href="/solicitudes"><button class="btn-principal">Solicitudes</button></a>
<a href="/inspector"><button class="btn-principal">Inspector</button></a>
<a href="/medico"><button class="btn-principal">Médico</button></a>
</div>
</div>

<!-- FORMULARIO -->
<div class="contenido">
<form method="POST" onsubmit="return validarFormulario()">

<select name="estudiante" id="estudiante">
<option value="">Seleccione estudiante</option>
{% for e in estudiantes %}
<option value="{{e.id_estudiante}}">{{e.nombre}}</option>
{% endfor %}
</select>

<div class="escala-dolor">
{% for i in range(1,11) %}
<label class="nivel-btn n-{{i}}">
<input type="radio" name="dolor" value="{{i}}">
<span>{{i}}</span>
</label>
{% endfor %}
</div>

<textarea name="motivo" id="motivo" placeholder="Escriba el motivo"></textarea>

<button type="submit" class="btn-principal">Enviar</button>

</form>
</div>

<!-- TABLA -->
<div class="contenido" id="contenedor"></div>

</div>

<script>
Notification.requestPermission();

let ultimoEstado = {}; // 🔥 guarda estados anteriores

function sonido(){
    new Audio("/static/mixkit-correct-answer-tone-2870.wav").play();
}

function notificar(texto){
    if(Notification.permission==="granted"){
        new Notification("MediGo",{body:texto});
    }
}

function cargar(){
fetch('/api/solicitudes')
.then(r=>r.json())
.then(data=>{

let contenedor = document.getElementById("contenedor");
contenedor.innerHTML = "";

data.forEach(s=>{

    // 🔥 DETECTAR CAMBIO DE ESTADO
    if(ultimoEstado[s.id_solicitud] && ultimoEstado[s.id_solicitud] !== s.estado){

        if(s.estado === "aprobado"){
            notificar("✅ Aprobado: " + s.nombre);
            sonido();
        }

        if(s.estado === "rechazado"){
            notificar("❌ Rechazado: " + s.nombre);
            sonido();
        }

        if(s.estado === "atendido"){
            notificar("🏥 Atendido: " + s.nombre);
            sonido();
        }
    }

    // guardar estado
    ultimoEstado[s.id_solicitud] = s.estado;

    contenedor.innerHTML += `
    <div class="tarjeta-solicitud">
        <div class="fila-info">
            <span class="nombre-est">${s.nombre}</span>
            <span>${s.estado}</span>
        </div>

        <div class="cuadro-motivo">${s.motivo}</div>

        <small>${
        new Date(s.fecha).toLocaleString('es-EC',{
        timeZone:'America/Guayaquil'
        })
        }</small>
    </div>
    `;
});

});
}

// 🔄 actualizar cada 3 segundos
setInterval(cargar,3000);
cargar();


// 🔥 VALIDACIÓN + CONFIRMACIÓN
function validarFormulario(){

let estudiante = document.getElementById("estudiante").value;
let motivo = document.getElementById("motivo").value;
let dolor = document.querySelector('input[name="dolor"]:checked');

if(estudiante === "" || motivo.trim() === "" || !dolor){
alert("⚠️ Debe llenar todos los campos");
return false;
}

let confirmar = confirm("¿Deseas enviar la solicitud?");
if(!confirmar){
return false;
}

return true;
}
</script>

</body>
</html>
