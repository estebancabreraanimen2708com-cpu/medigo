<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Solicitudes</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="contenedor">

<h1>Solicitudes Médicas</h1>

<form method="POST">

<select name="estudiante" required>

<option value="">
Seleccionar estudiante
</option>

{% for e in estudiantes %}

<option value="{{ e.id_estudiante }}">
{{ e.nombre }}
</option>

{% endfor %}

</select>

<textarea
name="motivo"
placeholder="Motivo"
required></textarea>

<h3>Escala del Dolor</h3>

<div class="dolor-container">

{% for i in range(1,11) %}

<input
type="radio"
name="dolor"
value="{{ i }}"
id="dolor{{ i }}"
required>

<label
for="dolor{{ i }}"
class="dolor dolor{{ i }}">

{{ i }}

</label>

{% endfor %}

</div>

<button type="submit" class="btn profesor">
ENVIAR SOLICITUD
</button>

</form>

</div>

</body>
</html>
