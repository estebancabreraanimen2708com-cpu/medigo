<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Solicitudes</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="contenedor-app">

    <div class="cabecera-azul">
        <h2>Nueva Solicitud Médica</h2>
    </div>

    <div class="contenido">

        <form method="POST">

            <label>Estudiante</label>
            <select name="estudiante" required>
                {% for e in estudiantes %}
                    <option value="{{ e.id_estudiante }}">
                        {{ e.nombre }}
                    </option>
                {% endfor %}
            </select>

            <label>Nivel de dolor</label>

            <div class="escala-dolor">
                {% for i in range(1,11) %}
                <label class="nivel-btn n-{{i}}">
                    <input type="radio" name="dolor" value="{{i}}" required>
                    <span>{{i}}</span>
                </label>
                {% endfor %}
            </div>

            <label>Motivo</label>
            <textarea name="motivo" required></textarea>

            <button class="btn-principal">
                Enviar solicitud
            </button>

        </form>

    </div>

    <div class="contenido">

        <h3>Solicitudes registradas</h3>

        <table width="100%">
            <tr>
                <th>Estudiante</th>
                <th>Motivo</th>
                <th>Estado</th>
                <th>Fecha</th>
            </tr>

            {% for s in solicitudes %}
            <tr>
                <td>{{ s.nombre }}</td>
                <td>{{ s.motivo }}</td>
                <td>{{ s.estado }}</td>
                <td>{{ s.fecha }}</td>
            </tr>
            {% endfor %}

        </table>

    </div>

</div>

</body>
</html>
