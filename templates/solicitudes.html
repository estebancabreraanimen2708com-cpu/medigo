<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solicitudes</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="contenedor-app">

<div class="cabecera-azul">
<h2>MediGo</h2>
</div>

<div class="contenido">
<div style="display:flex; gap:10px; justify-content:center;">
<a href="/solicitudes"><button class="btn-principal">Solicitudes</button></a>
<a href="/inspector"><button class="btn-principal">Inspector</button></a>
<a href="/medico"><button class="btn-principal">Médico</button></a>
</div>
</div>

<div class="contenido">

<form method="POST">

<select name="estudiante">
{% for e in estudiantes %}
<option value="{{e.id_estudiante}}">{{e.nombre}}</option>
{% endfor %}
</select>

<div class="escala-dolor">
{% for i in range(1,11) %}
<label class="nivel-btn n-{{i}}">
<input type="radio" name="dolor" value="{{i}}">
<span>{{i}}</span>
</label>
{% endfor %}
</div>

<textarea name="motivo" required></textarea>

<button class="btn-principal">Enviar</button>
</form>

</div>

<div class="contenido">
<table id="tabla">
<thead>
<tr>
<th>Nombre</th>
<th>Motivo</th>
<th>Dolor</th>
<th>Estado</th>
<th>Fecha</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

</div>

<script>
function cargar(){
fetch('/api/solicitudes')
.then(r=>r.json())
.then(data=>{
let t=document.querySelector("#tabla tbody");
t.innerHTML="";
data.forEach(s=>{
t.innerHTML+=`
<tr>
<td>${s.nombre}</td>
<td>${s.motivo}</td>
<td>${s.dolor}</td>
<td>${s.estado}</td>
<td>${new Date(s.fecha).toLocaleString()}</td>
</tr>`;
});
});
}
setInterval(cargar,5000);
cargar();
</script>

</body>
</html>
