<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Solicitudes</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
<div class="contenedor-app">

<div class="cabecera-azul">
<h2>Nueva Solicitud Médica</h2>
</div>

<div class="contenido">

<form method="POST">

<label>Estudiante</label>
<select name="estudiante" required>
{% for e in estudiantes %}
<option value="{{e.id_estudiante}}">{{e.nombre}}</option>
{% endfor %}
</select>

<label>Nivel de dolor</label>
<div class="escala-dolor">
{% for i in range(1,11) %}
<label class="nivel-btn n-{{i}}">
<input type="radio" name="dolor" value="{{i}}" required>
<span>{{i}}</span>
</label>
{% endfor %}
</div>

<label>Motivo</label>
<textarea name="motivo" required></textarea>

<button class="btn-principal">Enviar solicitud</button>
</form>

</div>

<div class="contenido">
<h3>Solicitudes registradas</h3>

<table id="tablaSolicitudes">
<thead>
<tr>
<th>Estudiante</th>
<th>Motivo</th>
<th>Dolor</th>
<th>Estado</th>
<th>Fecha</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>
</div>

<script>
function cargar() {
fetch('/api/solicitudes')
.then(r => r.json())
.then(data => {
let tbody = document.querySelector("#tablaSolicitudes tbody");
tbody.innerHTML = "";

data.forEach(s => {
let fecha = new Date(s.fecha).toLocaleString();

tbody.innerHTML += `
<tr>
<td>${s.nombre}</td>
<td>${s.motivo}</td>
<td>${s.dolor}</td>
<td>${s.estado}</td>
<td>${fecha}</td>
</tr>`;
});
});
}

setInterval(cargar, 5000);
cargar();
</script>

</body>
</html>
