<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<title>Solicitudes</title>
</head>

<body>

<div class="contenedor-app">

<img src="{{ url_for('static', filename='logo.jpg') }}" class="logo">

<h2>Solicitudes Médicas</h2>

<div class="contenido">

<form method="POST">

<select name="estudiante" required>
<option value="">Seleccionar estudiante</option>

{% for e in estudiantes %}
<option value="{{ e.id_estudiante }}">
{{ e.nombre }}
</option>
{% endfor %}

</select>

<textarea
name="motivo"
placeholder="Describe el motivo..."
required></textarea>

<label class="titulo-dolor">
Nivel de dolor
</label>

<div class="escala-dolor">

<label class="dolor d1">
<input type="radio" name="dolor" value="1" required>
<span>1</span>
</label>

<label class="dolor d2">
<input type="radio" name="dolor" value="2">
<span>2</span>
</label>

<label class="dolor d3">
<input type="radio" name="dolor" value="3">
<span>3</span>
</label>

<label class="dolor d4">
<input type="radio" name="dolor" value="4">
<span>4</span>
</label>

<label class="dolor d5">
<input type="radio" name="dolor" value="5">
<span>5</span>
</label>

<label class="dolor d6">
<input type="radio" name="dolor" value="6">
<span>6</span>
</label>

<label class="dolor d7">
<input type="radio" name="dolor" value="7">
<span>7</span>
</label>

<label class="dolor d8">
<input type="radio" name="dolor" value="8">
<span>8</span>
</label>

<label class="dolor d9">
<input type="radio" name="dolor" value="9">
<span>9</span>
</label>

<label class="dolor d10">
<input type="radio" name="dolor" value="10">
<span>10</span>
</label>

</div>

<button type="submit">
Enviar Solicitud
</button>

</form>

</div>

<div class="contenido">

<table id="tablaSolicitudes">

<thead>
<tr>
<th>Nombre</th>
<th>Estado</th>
<th>Fecha</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

</div>

<script>

let ultimoEstado = {};

function sonido(){
new Audio("/static/mixkit-correct-answer-tone-2870.wav").play();
}

function alerta(msg){

let div=document.createElement("div");

div.className="notificacion-pro";

div.innerText=msg;

document.body.appendChild(div);

setTimeout(()=>{
div.remove();
},3000);

sonido();

}

function cargar(){

fetch('/api/solicitudes')
.then(r=>r.json())
.then(data=>{

let tbody=document.querySelector("#tablaSolicitudes tbody");

tbody.innerHTML="";

data.forEach(s=>{

if(
ultimoEstado[s.id_solicitud]
&& ultimoEstado[s.id_solicitud]!=s.estado
){

if(s.estado==="aprobado"){
alerta("✅ Solicitud aprobada");
}

if(s.estado==="rechazado"){
alerta("❌ Solicitud rechazada");
}

if(s.estado==="atendido"){
alerta("🏥 Atención completada");
}

}

ultimoEstado[s.id_solicitud]=s.estado;

tbody.innerHTML+=`

<tr>
<td>${s.nombre}</td>
<td>${s.estado}</td>
<td>${s.fecha}</td>
</tr>

`;

});

});

}

setInterval(cargar,1000);

cargar();

</script>

</body>
</html>
