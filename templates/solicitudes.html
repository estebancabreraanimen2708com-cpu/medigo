<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="contenedor-app">

<div class="cabecera-azul"><h2>MediGo</h2></div>

<div class="contenido">
<div style="display:flex; gap:15px; justify-content:center;">
<a href="/solicitudes"><button class="btn-principal">Solicitudes</button></a>
<a href="/inspector"><button class="btn-principal">Inspector</button></a>
<a href="/medico"><button class="btn-principal">Médico</button></a>
</div>
</div>

<div class="contenido">
<form method="POST" onsubmit="return validarFormulario()">

<select name="estudiante" id="estudiante">
<option value="">Seleccione estudiante</option>
{% for e in estudiantes %}
<option value="{{e.id_estudiante}}">{{e.nombre}}</option>
{% endfor %}
</select>

<div class="escala-dolor">
{% for i in range(1,11) %}
<label class="nivel-btn n-{{i}}">
<input type="radio" name="dolor" value="{{i}}">
<span>{{i}}</span>
</label>
{% endfor %}
</div>

<textarea name="motivo" id="motivo" placeholder="Escriba el motivo"></textarea>

<button type="submit" class="btn-principal">Enviar</button>

</form>
</div>

<div class="contenido" id="contenedor"></div>

</div>

<script>
function validarFormulario(){

let estudiante = document.getElementById("estudiante").value;
let motivo = document.getElementById("motivo").value;
let dolor = document.querySelector('input[name="dolor"]:checked');

if(estudiante === "" || motivo.trim() === "" || !dolor){
alert("⚠️ Debe llenar todos los campos");
return false;
}

let confirmar = confirm("¿Deseas enviar la solicitud?");
if(!confirmar){
return false;
}

return true;
}
</script>

</body>
</html>
