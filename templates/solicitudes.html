<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="contenedor-app">

<div class="cabecera-azul">
<h2>Solicitudes</h2>
</div>

<div class="contenido">

<form method="POST">

<select name="estudiante" required>
<option value="">Seleccionar</option>
{% for e in estudiantes %}
<option value="{{ e.id_estudiante }}">{{ e.nombre }}</option>
{% endfor %}
</select>

<textarea name="motivo" placeholder="Motivo" required></textarea>

<div class="escala-dolor">
{% for i in range(1,11) %}
<label class="nivel-btn n-{{i}}">
<input type="radio" name="dolor" value="{{i}}" required>
<span>{{i}}</span>
</label>
{% endfor %}
</div>

<button class="btn-principal">Enviar</button>

</form>

</div>

<div class="contenido">
<table id="tablaSolicitudes" style="width:100%">
<thead>
<tr>
<th>Nombre</th>
<th>Motivo</th>
<th>Estado</th>
<th>Fecha</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

</div>

<script>

let cargando = false;

function cargar(){

if(cargando) return;
cargando = true;

fetch('/api/solicitudes')
.then(r=>r.json())
.then(data=>{

let tbody = document.querySelector("#tablaSolicitudes tbody");
tbody.innerHTML="";

data.forEach(s=>{
tbody.innerHTML += `
<tr>
<td>${s.nombre}</td>
<td>${s.motivo}</td>
<td>${s.estado}</td>
<td>${s.fecha}</td>
</tr>`;
});

cargando = false;

});

}

setInterval(cargar,3000);
cargar();

</script>

</body>
</html>
