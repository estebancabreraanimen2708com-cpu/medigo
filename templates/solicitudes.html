<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solicitudes</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="contenedor">

<h1>Solicitudes Médicas</h1>

<form method="POST">

<select name="estudiante" required>

<option value="">
Seleccionar estudiante
</option>

{% for e in estudiantes %}

<option value="{{ e.id_estudiante }}">
{{ e.nombre }}
</option>

{% endfor %}

</select>

<textarea
name="motivo"
placeholder="Motivo"
required></textarea>

<h3>Escala del Dolor</h3>

<div class="dolor-container">

{% for i in range(1,11) %}

<input
type="radio"
name="dolor"
value="{{ i }}"
id="dolor{{ i }}"
required>

<label
for="dolor{{ i }}"
class="dolor dolor{{ i }}">

{{ i }}

</label>

{% endfor %}

</div>

<button type="submit" class="btn profesor">
ENVIAR SOLICITUD
</button>

</form>

<h2>Estado de solicitudes</h2>

<div class="tabla-scroll">

<table>

<thead>

<tr>

<th>Nombre</th>
<th>Motivo</th>
<th>Dolor</th>
<th>Estado</th>
<th>Fecha</th>

</tr>

</thead>

<tbody id="tablaSolicitudes"></tbody>

</table>

</div>

</div>

<script>

let estadosAnteriores = {};
let primeraCarga = true;

let audio = new Audio("/static/mixkit-correct-answer-tone-2870.wav");

let audioListo = false;

/* =========================================
🔥 DESBLOQUEAR AUDIO IOS/ANDROID
========================================= */

function desbloquearAudio(){

    if(audioListo) return;

    audio.play()

    .then(() => {

        audio.pause();

        audio.currentTime = 0;

        audioListo = true;

        console.log("Audio desbloqueado");

    })

    .catch(() => {});
}

document.addEventListener(
    "click",
    desbloquearAudio,
    { once:true }
);

document.addEventListener(
    "touchstart",
    desbloquearAudio,
    { once:true }
);

/* =========================================
🔥 SONIDO
========================================= */

function sonido(){

    if(audioListo){

        audio.currentTime = 0;

        audio.play().catch(() => {});
    }
}

/* =========================================
🔥 NOTIFICACION
========================================= */

function notificar(mensaje){

    if("Notification" in window){

        if(Notification.permission === "default"){

            Notification.requestPermission();
        }

        if(Notification.permission === "granted"){

            new Notification("MediGo", {

                body: mensaje
            });
        }
    }

    sonido();
}

/* =========================================
🔥 TABLA
========================================= */

function cargarSolicitudes(){

fetch('/api/solicitudes')

.then(r => r.json())

.then(data => {

    let tabla =
    document.getElementById("tablaSolicitudes");

    tabla.innerHTML = "";

    data.forEach(s => {

        if(
            !primeraCarga &&
            estadosAnteriores[s.id_solicitud] &&
            estadosAnteriores[s.id_solicitud] !== s.estado
        ){

            if(s.estado === "Aprobado"){

                notificar(
                    "✅ Solicitud aprobada"
                );
            }

            if(s.estado === "Rechazado"){

                notificar(
                    "❌ Solicitud rechazada"
                );
            }

            if(s.estado === "Atendido"){

                notificar(
                    "🏥 Consulta finalizada"
                );
            }
        }

        estadosAnteriores[s.id_solicitud]
        = s.estado;

        tabla.innerHTML += `

        <tr>

            <td>${s.nombre}</td>

            <td>${s.motivo}</td>

            <td>${s.dolor}</td>

            <td>${s.estado}</td>

            <td>${s.fecha}</td>

        </tr>

        `;
    });

    primeraCarga = false;
});
}

setInterval(cargarSolicitudes, 1000);

cargarSolicitudes();

</script>

</body>
</html>
