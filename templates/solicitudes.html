<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solicitudes</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="contenedor">

<img src="{{ url_for('static', filename='logo.jpg') }}"
class="logo">

<h1>MediGo</h1>

<p class="subtitulo">
Sistema Médico Escolar
</p>

<form method="POST"
onsubmit="return confirmarSolicitud()">

<label>Curso</label>

<select name="curso" required>

<option value="">
Seleccionar curso
</option>

<option>Inicial 1</option>
<option>Inicial 2</option>

<option>1ro EGB</option>
<option>2do EGB</option>
<option>3ro EGB</option>
<option>4to EGB</option>
<option>5to EGB</option>
<option>6to EGB</option>
<option>7mo EGB</option>

<option>8vo EGB</option>
<option>9no EGB</option>
<option>10mo EGB</option>

<option>1ro Bachillerato</option>
<option>2do Bachillerato</option>
<option>3ro Bachillerato</option>

</select>


<label>
Nombre del estudiante
</label>

<input
type="text"
name="estudiante"
placeholder="Escribe el nombre del estudiante"
required>


<label>
Motivo
</label>

<textarea
name="motivo"
placeholder="Escribe el motivo..."
required></textarea>


<label>
Nivel de dolor
</label>

<div class="dolor-box">

<label>
<input type="radio"
name="dolor"
value="1"
required>

😊 Leve
</label>

<label>

<input type="radio"
name="dolor"
value="2">

😐 Moderado

</label>

<label>

<input type="radio"
name="dolor"
value="3">

😖 Urgente

</label>

</div>

<button
type="submit"
class="btn profesor">

ENVIAR SOLICITUD

</button>

</form>

</div>

<script>

function confirmarSolicitud(){

return confirm(
"¿Deseas enviar esta solicitud médica?"
);

}

</script>

</body>
</html>
