<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Medigo - Profesor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Nueva Solicitud Médica</h1>
        <form method="POST" class="card">
            <label>Seleccionar Estudiante:</label>
            <select name="estudiante" required>
                {% for e in estudiantes %}
                <option value="{{ e.id_estudiante }}">{{ e.nombres }}</option>
                {% endfor %}
            </select>
            <label>Motivo de la consulta:</label>
            <input type="text" name="motivo" placeholder="Ej. Dolor abdominal" required>
            <button type="submit">Enviar al Inspector</button>
        </form>

        <h2>Solicitudes de Hoy</h2>
        <table>
            <thead>
                <tr>
                    <th>Estudiante</th>
                    <th>Motivo</th>
                    <th>Fecha</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody>
                {% for s in solicitudes %}
                <tr>
                    <td>{{ s.nombre }}</td>
                    <td>{{ s.motivo }}</td>
                    <td>{{ s.fecha }}</td>
                    <td><span class="tag {{ s.estado }}">{{ s.estado }}</span></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
