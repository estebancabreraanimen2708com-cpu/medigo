<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Solicitudes</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>
<body>

<div class="contenedor-app">

    <img
    src="{{ url_for('static', filename='logo.jpg') }}"
    class="logo">

    <h1>Solicitudes Médicas</h1>

    <form method="POST">

        <select name="estudiante" required>

            <option value="">
                Seleccione estudiante
            </option>

            {% for e in estudiantes %}

            <option value="{{ e.id_estudiante }}">
                {{ e.nombre }}
            </option>

            {% endfor %}

        </select>

        <textarea
        name="motivo"
        placeholder="Motivo"
        required></textarea>

        <input
        type="number"
        name="dolor"
        min="1"
        max="10"
        placeholder="Escala del dolor"
        required>

        <button type="submit">
            Enviar Solicitud
        </button>

    </form>

</div>

</body>
</html>
