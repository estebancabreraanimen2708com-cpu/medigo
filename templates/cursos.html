<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Cursos</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

<style>

.paralelos{
    display:none;
    margin-top:18px;
    animation:aparecer .3s ease;
}

@keyframes aparecer{
    from{
        opacity:0;
        transform:translateY(-10px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

.grid-paralelos{
    display:grid;
    grid-template-columns:
    repeat(auto-fit,minmax(120px,1fr));
    gap:15px;
    margin-top:15px;
}

.btn-paralelo{
    height:65px;
    font-size:22px;
    border-radius:18px;
}

.curso-card{
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.12);
    border-radius:24px;
    padding:22px;
    margin-bottom:22px;
    transition:.25s;
}

.curso-card:hover{
    transform:translateY(-4px);
}

.btn-curso{
    height:85px;
    font-size:26px;
    border-radius:22px;
}

</style>

</head>

<body>

<div class="contenedor">

<img
src="{{ url_for('static', filename='logo.jpg') }}"
class="logo">

<h1>MediGo</h1>

<p class="subtitulo">
Sistema Médico Escolar Salesiano
</p>

<div class="imagenes-donbosco">

<img src="{{ url_for('static', filename='donbosco1.jpg') }}">

<img src="{{ url_for('static', filename='donbosco2.jpg') }}">

<img src="{{ url_for('static', filename='donbosco3.jpg') }}">

</div>

<div id="contenedorCursos"></div>

</div>

<script>

const cursos = [

"Inicial 1",
"Inicial 2",

"1ro EGB",
"2do EGB",
"3ro EGB",
"4to EGB",
"5to EGB",
"6to EGB",
"7mo EGB",

"8vo EGB",
"9no EGB",
"10mo EGB",

"1ro Bachillerato",
"2do Bachillerato",
"3ro Bachillerato"

];

const paralelos = [

"A",
"B",
"C",
"D"

];

const contenedor =
document.getElementById(
    "contenedorCursos"
);

cursos.forEach((curso,index)=>{

    let html = `

    <div class="curso-card">

        <button
        class="btn profesor btn-curso"
        onclick="toggleParalelos('p${index}')">

        ${curso}

        </button>

        <div
        id="p${index}"
        class="paralelos">

            <div class="grid-paralelos">

    `;

    paralelos.forEach(p=>{

        html += `

        <a href="/solicitudes?curso=${curso} ${p}">

            <button
            class="btn inspector btn-paralelo">

            ${p}

            </button>

        </a>

        `;
    });

    html += `

            </div>

        </div>

    </div>

    `;

    contenedor.innerHTML += html;
});

function toggleParalelos(id){

    let todos =
    document.querySelectorAll(
        ".paralelos"
    );

    todos.forEach(p=>{

        if(p.id !== id){

            p.style.display = "none";
        }
    });

    let actual =
    document.getElementById(id);

    if(
        actual.style.display === "block"
    ){

        actual.style.display = "none";
    }

    else{

        actual.style.display = "block";
    }
}

</script>

</body>
</html>
