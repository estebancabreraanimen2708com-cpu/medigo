<link rel="stylesheet"

<style>

.paralelos{
    display:none;
    margin-top:18px;
    animation:aparecer .3s ease;
}

@keyframes aparecer{
    from{
        opacity:0;
        transform:translateY(-10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.grid-paralelos{
    display:grid;
    grid-template-columns:
    repeat(auto-fit,minmax(120px,1fr));
    gap:15px;
    margin-top:15px;
}

.btn-paralelo{
    height:65px;
    font-size:22px;
    border-radius:18px;
}

.curso-card{
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.12);
    border-radius:24px;
    padding:22px;
    margin-bottom:22px;
    transition:.25s;
}

.curso-card:hover{
    transform:translateY(-4px);
}

.btn-curso{
    height:85px;
    font-size:28px;
    border-radius:22px;
}

</style>

</head>

<script>

function toggleParalelos(id){

    let todos =
    document.querySelectorAll(".paralelos");

    todos.forEach(p => {

        if(p.id !== id){
            p.style.display = "none";
        }
    });

    let actual =
    document.getElementById(id);

    if(
        actual.style.display === "block"
    ){
        actual.style.display = "none";
    }

    else{
        actual.style.display = "block";
    }
}

</script>
