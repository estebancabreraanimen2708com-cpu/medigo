<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Inspector</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <!-- 🔥 AUTO ACTUALIZACIÓN -->
    <meta http-equiv="refresh" content="8">
</head>

<body>

<div class="contenedor-app">

    <div class="cabecera-azul">
        <h2>Panel del Inspector</h2>

        <!-- 🔥 BOTÓN PDF -->
        <a href="{{ url_for('reporte_pdf') }}" target="_blank">
            <button class="btn-principal" style="margin-top:10px;">
                Descargar reporte PDF del día
            </button>
        </a>
    </div>

    <div class="contenido">

        {% for s in solicitudes %}

        <div class="tarjeta-solicitud">

            <div class="fila-info">
                <span class="nombre-est">{{ s.nombre }}</span>
                <span class="badge-pendiente">{{ s.estado }}</span>
            </div>

            <div class="cuadro-motivo">
                {{ s.motivo }}
            </div>

            <div style="font-size:12px; margin-top:5px;">
                {{ s.fecha.strftime('%d/%m/%Y %H:%M') if s.fecha }}
            </div>

            {% if s.estado == "pendiente" %}

            <a href="{{ url_for('aprobar', id=s.id_solicitud) }}">
                <button class="btn-principal">Aprobar</button>
            </a>

            <a href="{{ url_for('rechazar', id=s.id_solicitud) }}">
                <button class="btn-secundario">Rechazar</button>
            </a>

            {% endif %}

        </div>

        {% endfor %}

    </div>

</div>

</body>
</html>
