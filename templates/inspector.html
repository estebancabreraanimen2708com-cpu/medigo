<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<title>Inspector</title>
</head>

<body>

<!-- 🔥 PARTICULAS -->
<div class="particulas">

<span style="left:10%; animation-duration:12s;"></span>
<span style="left:20%; animation-duration:18s;"></span>
<span style="left:30%; animation-duration:10s;"></span>
<span style="left:40%; animation-duration:15s;"></span>
<span style="left:50%; animation-duration:20s;"></span>
<span style="left:60%; animation-duration:13s;"></span>
<span style="left:70%; animation-duration:17s;"></span>
<span style="left:80%; animation-duration:11s;"></span>
<span style="left:90%; animation-duration:16s;"></span>

</div>

<div class="contenedor-app">

<img src="{{ url_for('static', filename='logo.jpg') }}" class="logo">

<h2>Inspector</h2>

<a href="/descargar_pdf">
<button>📄 Descargar PDF</button>
</a>

<br><br>

<div id="tablaHoy"></div>

</div>

<script>

let ultimaCantidad = 0;

function sonido(){
    new Audio("/static/mixkit-correct-answer-tone-2870.wav").play();
}

function alerta(msg){

    let div=document.createElement("div");

    div.className="notificacion-pro";

    div.innerText=msg;

    document.body.appendChild(div);

    setTimeout(()=>{
        div.remove();
    },3000);

}

function cargar(){

fetch('/api/solicitudes')
.then(r=>r.json())
.then(data=>{

if(data.length > ultimaCantidad){

    let nueva=data[0];

    if(nueva.estado==="pendiente"){

        sonido();

        alerta("🚨 Nueva solicitud médica");

    }

}

ultimaCantidad=data.length;

let cont=document.getElementById("tablaHoy");

cont.innerHTML="";

data.forEach(s=>{

cont.innerHTML+=`

<div class="tarjeta-solicitud">

<h3>${s.nombre}</h3>

<p>${s.motivo}</p>

<p><b>Dolor:</b> ${s.dolor}</p>

${s.dolor >= 8 ? `
<div class="urgente">
🚨 URGENTE
</div>
` : ``}

<div class="estado ${s.estado}">
${s.estado}
</div>

<br>

${s.estado==="pendiente"?`

<a href="/aprobar/${s.id_solicitud}">
<button>✔ Aprobar</button>
</a>

<br><br>

<a href="/rechazar/${s.id_solicitud}">
<button>✖ Rechazar</button>
</a>

`:`
<b>✔ Procesada</b>
`}

</div>

`;

});

});

}

setInterval(cargar,1000);

cargar();

</script>

</body>
</html>
