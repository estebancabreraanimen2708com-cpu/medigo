<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="contenedor-app">

<div class="cabecera-azul">
<h2>Inspector</h2>
</div>

<!-- MENÚ -->
<div class="contenido">
<div style="display:flex; gap:15px; justify-content:center; flex-wrap:wrap;">
<a href="/solicitudes"><button class="btn-principal">Solicitudes</button></a>
<a href="/inspector"><button class="btn-principal">Inspector</button></a>
<a href="/medico"><button class="btn-principal">Médico</button></a>
</div>
</div>

<!-- 🔍 BUSCADOR -->
<div class="contenido">
<input type="text" id="buscador" placeholder="Buscar estudiante..."
style="width:100%; padding:10px; border-radius:10px; border:1px solid #ccc;">
</div>

<!-- TABLA -->
<div class="contenido">
<h3>Solicitudes de hoy</h3>

<a href="/pdf_hoy">
<button class="btn-principal">PDF del día</button>
</a>

<div id="tablaHoy"></div>
</div>

</div>

<script>

let hoy = new Date().toDateString();
let datosGlobal = [];

function cargar(){
fetch('/api/solicitudes')
.then(r=>r.json())
.then(data=>{

datosGlobal = data;

render(data);

});
}

// 🔍 FILTRO BUSCADOR
document.getElementById("buscador").addEventListener("keyup", function(){

let texto = this.value.toLowerCase();

let filtrados = datosGlobal.filter(s =>
s.nombre.toLowerCase().includes(texto)
);

render(filtrados);

});

// 🔄 RENDER
function render(data){

let div = document.getElementById("tablaHoy");
div.innerHTML="";

data.forEach(s=>{

let fecha = new Date(s.fecha).toDateString();

if(fecha === hoy){

div.innerHTML+=`
<div class="tarjeta-solicitud">

<div class="fila-info">
<a href="/historial/${s.id_estudiante}" style="text-decoration:none;">
<span class="nombre-est">${s.nombre}</span>
</a>
<span>${s.estado}</span>
</div>

<div class="cuadro-motivo">${s.motivo}</div>

<div style="display:flex; gap:10px;">

${s.estado==="pendiente"?`
<a href="/aprobar/${s.id_solicitud}">
<button class="btn-principal">Aprobar</button>
</a>

<a href="/rechazar/${s.id_solicitud}">
<button class="btn-principal">Rechazar</button>
</a>
`:``}

</div>

</div>
`;
}

});

}

setInterval(cargar,3000);
cargar();

</script>

</body>
</html>
