<script>
function cargar(){

fetch('/api/solicitudes')
.then(r=>r.json())
.then(data=>{

let cont = document.getElementById("tablaHoy");
cont.innerHTML = "";

let ids = new Set();

data.forEach(s=>{

if(ids.has(s.id_solicitud)) return;
ids.add(s.id_solicitud);

cont.innerHTML += `
<div class="tarjeta-solicitud">

<div class="fila-info">
<span class="nombre-est">${s.nombre}</span>
<span>${s.estado}</span>
</div>

<div class="cuadro-motivo">${s.motivo}</div>

${s.estado==="pendiente" ? `
<a href="/aprobar/${s.id_solicitud}"><button>Aprobar</button></a>
<a href="/rechazar/${s.id_solicitud}"><button>Rechazar</button></a>
` : ``}

</div>
`;
});

});
}

setInterval(cargar,3000);
cargar();
</script>
