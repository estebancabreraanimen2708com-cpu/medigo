<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Inspector</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<h2>Inspector</h2>

<a href="/reporte_pdf" target="_blank">
<button>PDF</button>
</a>

<table id="tabla">
<thead>
<tr>
<th>Nombre</th>
<th>Motivo</th>
<th>Estado</th>
<th>Acciones</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
function cargar() {
fetch('/api/solicitudes')
.then(r => r.json())
.then(data => {
let tbody = document.querySelector("#tabla tbody");
tbody.innerHTML = "";

data.forEach(s => {
let acciones = "";

if(s.estado === "pendiente"){
acciones = `
<a href="/aprobar/${s.id_solicitud}">✔</a>
<a href="/rechazar/${s.id_solicitud}">✖</a>`;
}

tbody.innerHTML += `
<tr>
<td>${s.nombre}</td>
<td>${s.motivo}</td>
<td>${s.estado}</td>
<td>${acciones}</td>
</tr>`;
});
});
}

setInterval(cargar, 5000);
cargar();
</script>

</body>
</html>
