<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="contenedor-app">

<div class="cabecera-azul">
<h2>Inspector</h2>
</div>

<!-- MENÚ -->
<div class="contenido">
<div style="display:flex; gap:15px; justify-content:center; flex-wrap:wrap;">
<a href="/solicitudes"><button class="btn-principal">Solicitudes</button></a>
<a href="/inspector"><button class="btn-principal">Inspector</button></a>
<a href="/medico"><button class="btn-principal">Médico</button></a>
</div>
</div>

<!-- 🔽 SELECT ESTUDIANTES -->
<div class="contenido">
<select id="selectEstudiante">
<option value="">Ver historial de estudiante</option>
</select>
</div>

<!-- TABLA -->
<div class="contenido">
<h3>Solicitudes de hoy</h3>

<a href="/pdf_hoy">
<button class="btn-principal">PDF del día</button>
</a>

<div id="tablaHoy"></div>
</div>

</div>

<script>

if (Notification.permission !== "granted") {
    Notification.requestPermission();
}

let hoy = new Date().toDateString();
let ultimoId = null;

function sonido(){
    new Audio("/static/mixkit-correct-answer-tone-2870.wav").play();
}

function notificar(texto){
    if(Notification.permission==="granted"){
        new Notification("MediGo",{body:texto});
    }
    sonido();
}

function cargar(){
fetch('/api/solicitudes')
.then(r=>r.json())
.then(data=>{

let tabla = document.getElementById("tablaHoy");
let select = document.getElementById("selectEstudiante");

tabla.innerHTML="";
select.innerHTML='<option value="">Ver historial de estudiante</option>';

// 🔔 nueva solicitud
if(data.length>0){
let n = data[0];
if(ultimoId !== null && n.id_solicitud > ultimoId){
    notificar("Nueva solicitud de "+n.nombre);
}
ultimoId = n.id_solicitud;
}

// llenar select sin duplicados
let usados = [];

data.forEach(s=>{

if(!usados.includes(s.id_estudiante)){
    usados.push(s.id_estudiante);

    select.innerHTML+=`
    <option value="${s.id_estudiante}">
    ${s.nombre}
    </option>`;
}

let fecha = new Date(s.fecha).toDateString();

if(fecha === hoy){

tabla.innerHTML+=`
<div class="tarjeta-solicitud">

<div class="fila-info">
<a href="/historial/${s.id_estudiante}">
<span class="nombre-est">${s.nombre}</span>
</a>
<span>${s.estado}</span>
</div>

<div class="cuadro-motivo">${s.motivo}</div>

<div style="display:flex; gap:10px;">

${s.estado==="pendiente"?`
<a href="/aprobar/${s.id_solicitud}">
<button class="btn-principal">Aprobar</button>
</a>

<a href="/rechazar/${s.id_solicitud}">
<button class="btn-principal">Rechazar</button>
</a>
`:``}

</div>

</div>
`;
}

});

// 🔽 cambio select
select.onchange = function(){
if(this.value){
window.location.href = "/historial/" + this.value;
}
}

});
}

setInterval(cargar,3000);
cargar();

</script>

</body>
</html>
