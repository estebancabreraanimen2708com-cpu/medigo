<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inspector</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="contenedor">

<h1>Panel Inspector</h1>

<button type="button" class="btn medico" onclick="activarAlertas()">
🔔 Activar notificaciones
</button>

<a href="/pdf">
<button class="btn pdf">📄 DESCARGAR PDF</button>
</a>

<div class="tabla-scroll">
<table>
<thead>
<tr>
<th>Nombre</th>
<th>Motivo</th>
<th>Dolor</th>
<th>Estado</th>
<th>Fecha</th>
<th>Acciones</th>
</tr>
</thead>

<tbody id="tablaInspector"></tbody>
</table>
</div>

</div>

<script>
let idsVistos = new Set();
let primeraCarga = true;
let audioActivado = false;
let audio = new Audio("/static/mixkit-correct-answer-tone-2870.wav");

function activarAlertas(){
    audio.play().then(() => {
        audio.pause();
        audio.currentTime = 0;
        audioActivado = true;
        alert("Notificaciones y sonido activados");
    }).catch(() => {
        alert("Toca otra vez para activar el sonido");
    });

    if("Notification" in window && Notification.permission !== "granted"){
        Notification.requestPermission();
    }
}

function sonido(){
    if(audioActivado){
        audio.currentTime = 0;
        audio.play().catch(() => {});
    }
}

function notificar(mensaje){
    if("Notification" in window && Notification.permission === "granted"){
        new Notification("MediGo", { body: mensaje });
    }
    sonido();
}

function cargarInspector(){
fetch('/api/solicitudes')
.then(r => r.json())
.then(data => {
    let tabla = document.getElementById("tablaInspector");
    tabla.innerHTML = "";

    data.forEach(s => {
        if(!primeraCarga && !idsVistos.has(s.id_solicitud) && s.estado === "Pendiente"){
            notificar("🔔 Nueva solicitud médica de " + s.nombre);
        }

        idsVistos.add(s.id_solicitud);

        let acciones = "";

        if(s.estado === "Pendiente"){
            acciones = `
            <a href="/aprobar/${s.id_solicitud}">
                <button class="aprobar">✔</button>
            </a>

            <a href="/rechazar/${s.id_solicitud}">
                <button class="rechazar">✖</button>
            </a>`;
        } else {
            acciones = s.estado;
        }

        tabla.innerHTML += `
        <tr>
            <td>${s.nombre}</td>
            <td>${s.motivo}</td>
            <td>${s.dolor}</td>
            <td>${s.estado}</td>
            <td>${s.fecha}</td>
            <td>${acciones}</td>
        </tr>`;
    });

    primeraCarga = false;
});
}

setInterval(cargarInspector, 1000);
cargarInspector();
</script>

</body>
</html>
