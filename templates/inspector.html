<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="contenedor-app">

<div class="cabecera-azul">
<h2>Inspector</h2>
</div>

<div class="contenido">
<select id="selectEstudiante"></select>
</div>

<div class="contenido">
<div id="tablaHoy"></div>
</div>

</div>

<script>

function cargar(){

fetch('/api/estudiantes')
.then(r=>r.json())
.then(est=>{
let select=document.getElementById("selectEstudiante");
select.innerHTML='<option value="">Ver historial</option>';

est.forEach(e=>{
select.innerHTML+=`<option value="${e.id_estudiante}">${e.nombre}</option>`;
});
});

fetch('/api/solicitudes')
.then(r=>r.json())
.then(data=>{
let tabla=document.getElementById("tablaHoy");
tabla.innerHTML="";

data.forEach(s=>{
tabla.innerHTML+=`
<div class="tarjeta-solicitud">

<div class="fila-info">
<a href="/historial/${s.id_estudiante}">
<span class="nombre-est">${s.nombre}</span>
</a>
<span>${s.estado}</span>
</div>

<div class="cuadro-motivo">${s.motivo}</div>

</div>
`;
});
});

document.getElementById("selectEstudiante").onchange=function(){
if(this.value){
window.location.href="/historial/"+this.value;
}
}

}

setInterval(cargar,3000);
cargar();

</script>

</body>
</html>
