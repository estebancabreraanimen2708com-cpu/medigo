<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="contenedor-app">

<div class="cabecera-azul">
<h2>Inspector</h2>
</div>

<!-- MENÚ -->
<div class="contenido">
<div style="display:flex; gap:15px; justify-content:center; flex-wrap:wrap;">
<a href="/solicitudes"><button class="btn-principal">Solicitudes</button></a>
<a href="/inspector"><button class="btn-principal">Inspector</button></a>
<a href="/medico"><button class="btn-principal">Médico</button></a>
</div>
</div>

<!-- HOY -->
<div class="contenido">
<h3>Solicitudes de hoy</h3>

<a href="/pdf_hoy">
<button class="btn-principal">Descargar PDF del día</button>
</a>

<div id="tablaHoy"></div>
</div>

<!-- HISTORICO -->
<div class="contenido">
<h3>Histórico</h3>
<div id="historico"></div>
</div>

</div>

<script>

let hoy = new Date().toDateString();

function cargar(){
fetch('/api/solicitudes')
.then(r=>r.json())
.then(data=>{

let hoyDiv = document.getElementById("tablaHoy");
let histDiv = document.getElementById("historico");

hoyDiv.innerHTML="";
histDiv.innerHTML="";

let guardado = JSON.parse(localStorage.getItem("historial")||"[]");

data.forEach(s=>{

let fecha = new Date(s.fecha).toDateString();

if(fecha === hoy){

hoyDiv.innerHTML+=`
<div class="tarjeta-solicitud">
<div class="fila-info">
<span class="nombre-est">${s.nombre}</span>
<span>${s.estado}</span>
</div>

<div class="cuadro-motivo">${s.motivo}</div>

<div style="display:flex; gap:10px;">
<a href="/pdf/${s.id_solicitud}">
<button class="btn-principal">Ficha</button>
</a>

${s.estado==="pendiente"?`
<a href="/aprobar/${s.id_solicitud}">
<button class="btn-principal">Aprobar</button>
</a>
<a href="/rechazar/${s.id_solicitud}">
<button class="btn-principal">Rechazar</button>
</a>
`:``}
</div>

</div>
`;

}else{

if(!guardado.find(x=>x.id_solicitud===s.id_solicitud)){
    guardado.push(s);
}

}

});

localStorage.setItem("historial", JSON.stringify(guardado));

guardado.forEach(s=>{
histDiv.innerHTML+=`
<div class="tarjeta-solicitud">
<div class="fila-info">
<span class="nombre-est">${s.nombre}</span>
<span>${s.estado}</span>
</div>

<div class="cuadro-motivo">${s.motivo}</div>

<a href="/pdf/${s.id_solicitud}">
<button class="btn-principal">Descargar ficha</button>
</a>

</div>
`;
});

});
}

setInterval(cargar,3000);
cargar();

</script>

</body>
</html>
