<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inspector</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=500">
</head>

<body>

<div class="contenedor">

<img src="{{ url_for('static', filename='logo.jpg') }}" class="logo">

<div class="circulos-derecha">
<img src="{{ url_for('static', filename='escudo.png') }}" class="circulo-img">
<img src="{{ url_for('static', filename='salesianos.png') }}" class="circulo-img">
</div>

<h1>Panel Inspector</h1>

<a href="/pdf">
<button class="btn pdf">📄 DESCARGAR PDF</button>
</a>

<div class="tabla-scroll">

<table>
<thead>
<tr>
<th>Profesor ID</th>
<th>Profesor</th>
<th>Curso</th>
<th>Nombre</th>
<th>Motivo</th>
<th>Dolor</th>
<th>Decisión Médico</th>
<th>Estado</th>
<th>Estado Consulta</th>
<th>Fecha</th>
<th>Observaciones</th>
<th>Acciones</th>
</tr>
</thead>

<tbody id="tablaInspector"></tbody>
</table>

</div>

</div>

<button class="btn-mas" onclick="abrirModal()">+</button>

<div id="modal" class="modal">

<div class="modal-content">

<span class="cerrar" onclick="cerrarModal()">×</span>

<h2>Nueva Solicitud</h2>

<form method="POST" action="/solicitudes" id="formInspector">

<input type="hidden" name="origen" value="inspector">

<div class="card-seccion">
<h3>Curso</h3>

<select name="curso" required>
<option value="">Seleccionar curso</option>

<option>Inicial 1</option>
<option>Inicial 2</option>

<option>1ro A</option>
<option>1ro B</option>
<option>1ro C</option>
<option>1ro D</option>

<option>2do A</option>
<option>2do B</option>
<option>2do C</option>
<option>2do D</option>

<option>3ro A</option>
<option>3ro B</option>
<option>3ro C</option>
<option>3ro D</option>

<option>4to A</option>
<option>4to B</option>
<option>4to C</option>
<option>4to D</option>

<option>5to A</option>
<option>5to B</option>
<option>5to C</option>
<option>5to D</option>

<option>6to A</option>
<option>6to B</option>
<option>6to C</option>
<option>6to D</option>

<option>7mo A</option>
<option>7mo B</option>
<option>7mo C</option>
<option>7mo D</option>

<option>8vo A</option>
<option>8vo B</option>
<option>8vo C</option>
<option>8vo D</option>

<option>9no A</option>
<option>9no B</option>
<option>9no C</option>
<option>9no D</option>

<option>10mo A</option>
<option>10mo B</option>
<option>10mo C</option>
<option>10mo D</option>

<option>1ro Bachillerato INF</option>
<option>1ro Bachillerato ET</option>
<option>1ro Bachillerato CCA</option>
<option>1ro Bachillerato CCB</option>

<option>2do Bachillerato INF</option>
<option>2do Bachillerato ET</option>
<option>2do Bachillerato CCA</option>
<option>2do Bachillerato CCB</option>

<option>3ro Bachillerato INF</option>
<option>3ro Bachillerato ET</option>
<option>3ro Bachillerato CCA</option>
<option>3ro Bachillerato CCB</option>
</select>
</div>

<div class="card-seccion">
<h3>Nombre del estudiante</h3>
<input type="text" name="nombre_manual" placeholder="Escribe el nombre del estudiante" required>
</div>

<div class="card-seccion">
<h3>Motivo</h3>
<textarea name="motivo" placeholder="Escribe el motivo..." required></textarea>
</div>

<div class="card-seccion">
<h3>Nivel de Dolor</h3>

<div class="emociones">

<input type="radio" name="dolor" value="1" id="insDolor1" required>
<label for="insDolor1" class="cara verde">
<img src="{{ url_for('static', filename='donbosco_leve.png') }}" class="donbosco-cara">
<span>Leve</span>
</label>

<input type="radio" name="dolor" value="2" id="insDolor2">
<label for="insDolor2" class="cara amarillo">
<img src="{{ url_for('static', filename='donbosco_moderado.png') }}" class="donbosco-cara">
<span>Moderado</span>
</label>

<input type="radio" name="dolor" value="3" id="insDolor3">
<label for="insDolor3" class="cara rojo">
<img src="{{ url_for('static', filename='donbosco_urgente.png') }}" class="donbosco-cara">
<span>🔔 Urgente</span>
</label>

</div>
</div>

<button type="button" class="btn inspector" onclick="abrirConfirmacionInspector()">
ENVIAR SOLICITUD
</button>

</form>

</div>

</div>

<div id="modalConfirmacionInspector" class="confirm-modal">
<div class="confirm-card">
<h2>Confirmar solicitud</h2>
<p>¿Seguro que deseas enviar esta solicitud desde Inspector?</p>

<div class="confirm-actions">
<button class="btn-cancelar" onclick="cerrarConfirmacionInspector()">Cancelar</button>
<button class="btn-confirmar" onclick="enviarSolicitudInspector()">Sí, enviar</button>
</div>
</div>
</div>

<script>
let solicitudesInspector = JSON.parse(localStorage.getItem("solicitudesInspector") || "[]");
let primeraCargaInspector = solicitudesInspector.length === 0;
let audio = new Audio("/static/mixkit-correct-answer-tone-2870.wav");
let audioListo = false;

function abrirModal(){
    document.getElementById("modal").style.display = "flex";
}

function cerrarModal(){
    document.getElementById("modal").style.display = "none";
}

function abrirConfirmacionInspector(){
    let form = document.getElementById("formInspector");

    if(form.checkValidity()){
        document.getElementById("modalConfirmacionInspector").style.display = "flex";
    }else{
        form.reportValidity();
    }
}

function cerrarConfirmacionInspector(){
    document.getElementById("modalConfirmacionInspector").style.display = "none";
}

function enviarSolicitudInspector(){
    document.getElementById("formInspector").submit();
}

function desbloquearAudio(){
    if(audioListo) return;

    audio.play()
    .then(() => {
        audio.pause();
        audio.currentTime = 0;
        audioListo = true;
    })
    .catch(() => {});
}

document.addEventListener("click", desbloquearAudio, { once:true });
document.addEventListener("touchstart", desbloquearAudio, { once:true });

function sonido(){
    if(audioListo){
        audio.currentTime = 0;
        audio.play().catch(() => {});
    }
}

function toast(mensaje){
    let div = document.createElement("div");
    div.className = "toast-medigo";
    div.textContent = mensaje;
    document.body.appendChild(div);

    setTimeout(() => {
        div.remove();
    }, 3700);
}

function notificar(mensaje){
    toast(mensaje);
    sonido();
}

function cargarInspector(){

fetch('/api/solicitudes')
.then(r => r.json())
.then(data => {

    let actuales = data.map(s => String(s.id_solicitud));

    if(!primeraCargaInspector){
        data.forEach(s => {
            if(!solicitudesInspector.includes(String(s.id_solicitud))){
                notificar("📩 Nueva solicitud: " + s.nombre + " - " + (s.curso || ""));
            }
        });
    }

    solicitudesInspector = actuales;
    localStorage.setItem("solicitudesInspector", JSON.stringify(solicitudesInspector));
    primeraCargaInspector = false;

    let tabla = document.getElementById("tablaInspector");
    tabla.innerHTML = "";

    data.forEach(s => {

        let acciones = "";

        if(s.estado === "Pendiente"){
            if(s.decision_medico === "🟢 Puede subir"){
                acciones = `
                <a href="/aprobar/${s.id_solicitud}">
                    <button class="aprobar">✔ Aprobar</button>
                </a>
                `;
            }else if(s.decision_medico === "🔴 No puede subir"){
                acciones = `
                <a href="/rechazar/${s.id_solicitud}">
                    <button class="rechazar">✖ Rechazar</button>
                </a>
                `;
            }else{
                acciones = "Esperando revisión médica";
            }
        }else{
            acciones = s.estado;
        }

        let dolorTexto = "";

        if(s.dolor == 1){
            dolorTexto = "😊 Leve";
        }else if(s.dolor == 2){
            dolorTexto = "😐 Moderado";
        }else if(s.dolor == 3){
            dolorTexto = "🔔 😖 Urgente";
        }else{
            dolorTexto = s.dolor;
        }

        let claseFila = "";

        if(s.dolor == 3 && s.estado !== "Atendido"){
            claseFila = "background:rgba(239,68,68,.18); box-shadow:inset 5px 0 #ef4444;";
        }

        tabla.innerHTML += `
        <tr style="${claseFila}">
            <td>${s.profesor_id || ""}</td>
            <td>${s.profesor_nombre || ""}</td>
            <td>${s.curso || ""}</td>
            <td>
                <a href="/historial/${encodeURIComponent(s.nombre)}"
                style="color:#0056b3;font-weight:bold;">
                ${s.nombre}
                </a>
            </td>
            <td>${s.motivo}</td>
            <td>${dolorTexto}</td>
            <td>${s.decision_medico || "Sin revisar"}</td>
            <td>${s.estado}</td>
            <td>${s.estado_consulta || "Esperando atención"}</td>
            <td>${s.fecha}</td>
            <td>${s.observaciones || "Sin observaciones"}</td>
            <td>${acciones}</td>
        </tr>
        `;
    });
});
}

setInterval(cargarInspector,3000);
cargarInspector();
</script>

</body>
</html>
