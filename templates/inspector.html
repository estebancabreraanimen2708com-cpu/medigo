<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="contenedor-app">

<div class="cabecera-azul">
<h2>Inspector</h2>
</div>

<!-- MENÚ -->
<div class="contenido">
<div style="display:flex; gap:15px; justify-content:center; flex-wrap:wrap;">
<a href="/solicitudes"><button class="btn-principal">Solicitudes</button></a>
<a href="/inspector"><button class="btn-principal">Inspector</button></a>
<a href="/medico"><button class="btn-principal">Médico</button></a>
</div>
</div>

<!-- 🔥 SOLICITUDES ACTIVAS -->
<div class="contenido">
<h3>Solicitudes</h3>
<div id="contenedor"></div>
</div>

<!-- 🔥 HISTORIAL DEL DÍA -->
<div class="contenido">
<h3>Historial del día</h3>

<a href="/descargar_pdf">
<button class="btn-principal">Descargar PDF</button>
</a>

<div id="historial"></div>
</div>

</div>

<script>

if (Notification.permission !== "granted") {
    Notification.requestPermission();
}

let ultimoId = null;

// 🔥 CONTROL DE DÍA
let hoy = new Date().toDateString();

function resetearSiEsNuevoDia(){
    let actual = new Date().toDateString();
    if(actual !== hoy){
        localStorage.removeItem("historial");
        hoy = actual;
    }
}

// 🔊 sonido
function sonido(){
    new Audio("/static/mixkit-correct-answer-tone-2870.wav").play();
}

// 🔔 notificación
function notificar(texto){
    if(Notification.permission==="granted"){
        new Notification("MediGo",{body:texto});
    }

    let div=document.createElement("div");
    div.innerText=texto;
    div.style.position="fixed";
    div.style.bottom="20px";
    div.style.left="50%";
    div.style.transform="translateX(-50%)";
    div.style.background="#0056b3";
    div.style.color="white";
    div.style.padding="10px 20px";
    div.style.borderRadius="20px";
    div.style.zIndex="9999";
    document.body.appendChild(div);
    setTimeout(()=>div.remove(),3000);

    sonido();
}

// 💾 guardar historial
function guardarHistorial(data){
    localStorage.setItem("historial", JSON.stringify(data));
}

// 📥 cargar historial
function cargarHistorial(){
    let data = JSON.parse(localStorage.getItem("historial") || "[]");

    let h = document.getElementById("historial");
    h.innerHTML = "";

    data.forEach(s=>{
        h.innerHTML += `
        <div class="tarjeta-solicitud">
            <div class="fila-info">
                <span class="nombre-est">${s.nombre}</span>
                <span>${s.estado}</span>
            </div>
            <div class="cuadro-motivo">${s.motivo}</div>
            <small>${s.fecha}</small>
        </div>
        `;
    });
}

// 🔄 cargar solicitudes
function cargar(){
resetearSiEsNuevoDia();

fetch('/api/solicitudes')
.then(r=>r.json())
.then(data=>{

let c=document.getElementById("contenedor");
c.innerHTML="";

let historial = [];

if(data.length>0){
let nueva=data[0];

// 🔔 nueva solicitud
if(ultimoId !== null && nueva.id_solicitud > ultimoId){
    notificar("📨 Nueva solicitud de "+nueva.nombre);
}

ultimoId = nueva.id_solicitud;
}

data.forEach(s=>{

// 🔥 si ya fue procesada → va al historial
if(s.estado !== "pendiente"){
    historial.push(s);

    c.innerHTML += `
    <div class="tarjeta-solicitud">
        <div class="fila-info">
            <span class="nombre-est">${s.nombre}</span>
            <span>${s.estado}</span>
        </div>
        <div class="cuadro-motivo">${s.motivo}</div>
        <small>${s.fecha}</small>
    </div>
    `;
}else{

// 🔥 pendientes → con botones separados
c.innerHTML += `
<div class="tarjeta-solicitud">
    <div class="fila-info">
        <span class="nombre-est">${s.nombre}</span>
        <span>${s.estado}</span>
    </div>

    <div class="cuadro-motivo">${s.motivo}</div>

    <div style="display:flex; gap:10px; margin-top:10px;">
        <a href="/aprobar/${s.id_solicitud}" style="flex:1;">
        <button class="btn-principal">Aprobar</button>
        </a>

        <a href="/rechazar/${s.id_solicitud}" style="flex:1;">
        <button class="btn-principal">Rechazar</button>
        </a>
    </div>
</div>
`;
}

});

// guardar historial diario
guardarHistorial(historial);
cargarHistorial();

});
}

setInterval(cargar,3000);
cargar();

</script>

</body>
</html>
