<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Inspector</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="contenedor-app">

<div class="cabecera-azul">
<h2>Inspector</h2>
<a href="/reporte_pdf" target="_blank">
<button class="btn-principal">PDF</button>
</a>
</div>

<div class="contenido">
<div style="display:flex; gap:10px; justify-content:center;">
<a href="/solicitudes"><button class="btn-principal">Solicitudes</button></a>
<a href="/inspector"><button class="btn-principal">Inspector</button></a>
<a href="/medico"><button class="btn-principal">Médico</button></a>
</div>
</div>

<div class="contenido" id="contenedor"></div>

</div>

<script>
function cargar(){
fetch('/api/solicitudes')
.then(r=>r.json())
.then(data=>{
let c=document.getElementById("contenedor");
c.innerHTML="";
data.forEach(s=>{
let botones="";
if(s.estado==="pendiente"){
botones=`
<a href="/aprobar/${s.id_solicitud}"><button>Aprobar</button></a>
<a href="/rechazar/${s.id_solicitud}"><button>Rechazar</button></a>`;
}
c.innerHTML+=`
<div class="tarjeta-solicitud">
<b>${s.nombre}</b> - ${s.estado}<br>
${s.motivo}<br>
${new Date(s.fecha).toLocaleString()}<br>
${botones}
</div>`;
});
});
}
setInterval(cargar,5000);
cargar();
</script>

</body>
</html>
