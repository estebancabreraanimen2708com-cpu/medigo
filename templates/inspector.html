<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inspector</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="contenedor">

<h1>Panel Inspector</h1>

<a href="/pdf">

<button class="btn inspector">
📄 DESCARGAR PDF
</button>

</a>

<table>

<tr>

<th>Nombre</th>
<th>Motivo</th>
<th>Dolor</th>
<th>Estado</th>
<th>Acciones</th>

</tr>

{% for s in solicitudes %}

<tr>

<td>{{ s.nombre }}</td>

<td>{{ s.motivo }}</td>

<td>{{ s.dolor }}</td>

<td>{{ s.estado }}</td>

<td>

{% if s.estado == "Pendiente" %}

<a href="/aprobar/{{ s.id_solicitud }}">

<button class="aprobar">
✔
</button>

</a>

<a href="/rechazar/{{ s.id_solicitud }}">

<button class="rechazar">
✖
</button>

</a>

{% else %}

{{ s.estado }}

{% endif %}

</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
