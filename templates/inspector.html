<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<script>
if (Notification.permission !== "granted") {
    Notification.requestPermission();
}
</script>
</head>

<body>

<div class="contenedor-app">
<div class="cabecera-azul"><h2>Inspector</h2></div>

<div id="contenedor"></div>

</div>

<script>
function cargar(){
fetch('/api/solicitudes')
.then(r=>r.json())
.then(d=>{
let c=document.getElementById("contenedor");
c.innerHTML="";
d.forEach(s=>{
c.innerHTML+=`
<div class="tarjeta-solicitud">
${s.nombre}<br>
${s.motivo}<br>
<a href="/aprobar/${s.id_solicitud}"><button>Aprobar</button></a>
<a href="/rechazar/${s.id_solicitud}"><button>Rechazar</button></a>
</div>`;
});
});
}
setInterval(cargar,4000);
cargar();
</script>

</body>
</html>
